name: Bug report
description: Something in the plugin or the Core misbehaved
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: "`/plugin` → odin in Claude Code, or `codex plugin list` in Codex CLI. For MCP issues, include the `serverInfo.version` string (e.g. `1.10.0+format-1.2`)."
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Host
      options:
        - Claude Code
        - Codex CLI
        - Both / other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened, and what did you expect?
      description: The command or phrasing you used, what Odin did, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: lint
    attributes:
      label: lint / status output (for base-health issues)
      description: Output of `lint` on the affected base, if relevant. Redact anything private — never paste source contents you wouldn't publish.
